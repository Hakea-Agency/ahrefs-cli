<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" font-family="'Menlo','DejaVu Sans Mono','Consolas',monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .prompt { fill: #a6e3a1; }
      .cmd { fill: #cdd6f4; }
      .header { fill: #89b4fa; }
      .sep { fill: #585b70; }
      .data { fill: #cdd6f4; }
      .dim { fill: #6c7086; }
      .val-green { fill: #a6e3a1; }
      .val-yellow { fill: #f9e2af; }
      .title-bar { fill: #313244; }
      .dot-red { fill: #f38ba8; }
      .dot-yellow { fill: #f9e2af; }
      .dot-green { fill: #a6e3a1; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="680" height="460" rx="8"/>
  <!-- Title bar -->
  <rect class="title-bar" width="680" height="28" rx="8"/>
  <rect class="title-bar" y="20" width="680" height="8"/>
  <circle class="dot-red" cx="16" cy="14" r="5.5"/>
  <circle class="dot-yellow" cx="34" cy="14" r="5.5"/>
  <circle class="dot-green" cx="52" cy="14" r="5.5"/>
  <text x="340" y="18" text-anchor="middle" class="dim" font-size="12">ahrefs-cli</text>

  <!-- Command 1: DR -->
  <text x="16" y="58">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">ahrefs dr hakea.fi</tspan>
  </text>
  <text x="16" y="80" class="data">  domain_rating: 42</text>
  <text x="16" y="96" class="data">  ahrefs_rank: 318,402</text>
  <text x="16" y="118" class="dim">  Cost: 50 units | Month total: 50 units</text>

  <!-- Command 2: Organic -->
  <text x="16" y="150">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">ahrefs organic hakea.fi --country fi --limit 5</tspan>
  </text>
  <text x="16" y="174" class="header">keyword                       | volume | position | traffic | url</text>
  <text x="16" y="190" class="sep">------------------------------+--------+----------+---------+-----------------------------</text>
  <text x="16" y="206" class="data">hakukoneoptimointi             | 1,900  | 4        | 312     | hakea.fi/seo</text>
  <text x="16" y="222" class="data">seo toimisto                   | 720    | 3        | 198     | hakea.fi/</text>
  <text x="16" y="238" class="data">google mainonta                | 1,300  | 7        | 87      | hakea.fi/sea</text>
  <text x="16" y="254" class="data">hakukonemarkkinointi           | 590    | 5        | 64      | hakea.fi/</text>
  <text x="16" y="270" class="data">hakukonemainonta hinta         | 480    | 6        | 41      | hakea.fi/sea/hinta</text>
  <text x="16" y="292" class="dim">  Cost: 50 units | Month total: 100 units</text>

  <!-- Command 3: Keyword -->
  <text x="16" y="324">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">ahrefs keyword "seo" --country fi</tspan>
  </text>
  <text x="16" y="348" class="header">keyword | volume | keyword_difficulty | cpc  | global_volume</text>
  <text x="16" y="364" class="sep">--------+--------+--------------------+------+--------------</text>
  <text x="16" y="380" class="data">seo     | 4,400  | 48                 | 3.20 | 1,220,000</text>
  <text x="16" y="402" class="dim">  Cost: 50 units | Month total: 150 units</text>

  <!-- Cursor -->
  <text x="16" y="434">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">▌</tspan>
  </text>
</svg>
